name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [frontend, backend]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            bhargavpateldevops/voyage-${{ matrix.service }}:${{ env.IMAGE_TAG }}

      - name: Update Kubernetes Manifest
        run: |
          sed -i "s|image: bhargavpateldevops/voyage-${{ matrix.service }}:.*|image: bhargavpateldevops/voyage-${{ matrix.service }}:${{ env.IMAGE_TAG }}|g" kubernetes/${{ matrix.service }}.yml

      - name: Commit and Push Manifest Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add kubernetes/${{ matrix.service }}.yml

          git diff --staged --quiet || \
          git commit -m "Update voyage-${{ matrix.service }} image to ${{ env.IMAGE_TAG }}"
          echo "Update voyage-${{ matrix.service }} image to ${{ env.IMAGE_TAG }}"      
          git push origin main